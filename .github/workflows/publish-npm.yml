name: Publish UPM Packages

on:
  workflow_dispatch:
    inputs:
      package:
        description: "Package to publish"
        required: true
        type: choice
        options:
          - core
          - runtime
          - yandex

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Publish core
        if: ${{ github.event.inputs.package == 'core' }}
        working-directory: Packages/com.evo.infrastructure.core
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish runtime
        if: ${{ github.event.inputs.package == 'runtime' }}
        working-directory: Packages/com.evo.infrastructure.runtime
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish yandex
        if: ${{ github.event.inputs.package == 'yandex' }}
        working-directory: Packages/com.evo.infrastructure.yandex
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
